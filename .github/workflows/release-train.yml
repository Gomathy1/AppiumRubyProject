name: Release Train

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release Type'
        required: true
        type: choice
        options:
          - release_train
          - hotfix
      version:
        description: 'Version (e.g., 1.0.0)'
        required: true
        type: string
      skip_to_stage:
        description: 'Skip to stage (optional)'
        required: false
        type: choice
        options:
          - ''
          - internal
          - friends_family
          - beta
          - review
          - production
      stop_at_stage:
        description: 'Stop at stage (optional)'
        required: false
        type: choice
        options:
          - ''
          - internal
          - friends_family
          - beta
          - review

env:
  RELEASE_VERSION: ${{ github.event.inputs.version }}
  RELEASE_TYPE: ${{ github.event.inputs.release_type }}

jobs:
  # ========== STAGE 0: BUILD RELEASE ==========
  build_release:
    name: Build Release from Master
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.skip_to_stage == '' ||
      github.event.inputs.skip_to_stage == 'internal'
    outputs:
      build_number: ${{ steps.build_info.outputs.build_number }}
      android_apk: ${{ steps.build_info.outputs.android_apk }}
      ios_ipa: ${{ steps.build_info.outputs.ios_ipa }}
    
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
      
      - name: Run Tests
        run: |
          bundle install
          bundle exec rspec spec/unit --format documentation
          bundle exec cucumber -p api
      
      - name: Set Build Info
        id: build_info
        run: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M%S)
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "android_apk=app-release-${{ github.event.inputs.version }}.apk" >> $GITHUB_OUTPUT
          echo "ios_ipa=app-release-${{ github.event.inputs.version }}.ipa" >> $GITHUB_OUTPUT
      
      - name: Create Release Tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v${{ github.event.inputs.version }}" -m "Release ${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"
      
      - name: Trigger Bitrise Build (Android)
        run: |
          curl -X POST "https://app.bitrise.io/app/${{ secrets.BITRISE_APP_SLUG }}/build/start.json" \
            -H "Authorization: ${{ secrets.BITRISE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "hook_info": {
                "type": "bitrise"
              },
              "build_params": {
                "branch": "master",
                "workflow_id": "build_android_release",
                "environments": [
                  {"mapped_to": "VERSION", "value": "${{ github.event.inputs.version }}"}
                ]
              }
            }'
      
      - name: Trigger Bitrise Build (iOS)
        run: |
          curl -X POST "https://app.bitrise.io/app/${{ secrets.BITRISE_IOS_APP_SLUG }}/build/start.json" \
            -H "Authorization: ${{ secrets.BITRISE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "hook_info": {
                "type": "bitrise"
              },
              "build_params": {
                "branch": "master",
                "workflow_id": "build_ios_release",
                "environments": [
                  {"mapped_to": "VERSION", "value": "${{ github.event.inputs.version }}"}
                ]
              }
            }'
      
      - name: Create Release Notes
        run: |
          cat > release_notes.md << EOF
          # Release ${{ github.event.inputs.version }}
          
          **Build Number:** ${{ steps.build_info.outputs.build_number }}
          **Release Type:** ${{ github.event.inputs.release_type }}
          **Date:** $(date)
          
          ## Changes
          - Auto-generated release from master branch
          
          ## Test Results
          - Unit Tests: ✅ Passed
          - API Tests: ✅ Passed
          EOF
      
      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            release_notes.md
          retention-days: 30

  # ========== STAGE 1: INTERNAL TESTERS (X + 2 hours) ==========
  deploy_internal:
    name: Deploy to Internal Testers
    runs-on: ubuntu-latest
    needs: build_release
    if: |
      always() &&
      (needs.build_release.result == 'success' || github.event.inputs.skip_to_stage == 'internal') &&
      github.event.inputs.stop_at_stage != 'internal' &&
      github.event.inputs.release_type == 'release_train'
    
    steps:
      - name: Wait for scheduled time (2 hours)
        if: github.event.inputs.release_type == 'release_train'
        run: sleep 7200
      
      - name: Deploy to Firebase App Distribution (Internal)
        run: |
          echo "Deploying to Internal Testers..."
          echo "Version: ${{ github.event.inputs.version }}"
          # Add Firebase App Distribution deployment here
      
      - name: Notify Internal Testers
        run: |
          echo "Sending notification to internal testers"
          # Add Slack/Email notification here

  # ========== STAGE 2: FRIENDS & FAMILY (X + 4 hours) ==========
  deploy_friends_family:
    name: Deploy to Friends & Family
    runs-on: ubuntu-latest
    needs: [build_release, deploy_internal]
    if: |
      always() &&
      (needs.deploy_internal.result == 'success' || github.event.inputs.skip_to_stage == 'friends_family') &&
      github.event.inputs.stop_at_stage != 'friends_family' &&
      github.event.inputs.release_type == 'release_train'
    
    steps:
      - name: Wait for scheduled time (2 hours after internal)
        if: github.event.inputs.release_type == 'release_train' && github.event.inputs.skip_to_stage == ''
        run: sleep 7200
      
      - name: Deploy to TestFlight (Friends & Family)
        run: |
          echo "Deploying to Friends & Family..."
          echo "Version: ${{ github.event.inputs.version }}"
          # Add TestFlight deployment here
      
      - name: Deploy to Google Play Internal Testing
        run: |
          echo "Deploying to Google Play Internal Testing..."
          # Add Google Play deployment here
      
      - name: Notify Friends & Family
        run: |
          echo "Sending notification to friends & family"

  # ========== STAGE 3: BETA TESTERS (X + 8 hours) ==========
  deploy_beta:
    name: Deploy to Beta Testers
    runs-on: ubuntu-latest
    needs: [build_release, deploy_friends_family]
    if: |
      always() &&
      (needs.deploy_friends_family.result == 'success' || github.event.inputs.skip_to_stage == 'beta') &&
      github.event.inputs.stop_at_stage != 'beta' &&
      github.event.inputs.release_type == 'release_train'
    
    steps:
      - name: Wait for scheduled time (4 hours after friends & family)
        if: github.event.inputs.release_type == 'release_train' && github.event.inputs.skip_to_stage == ''
        run: sleep 14400
      
      - name: Deploy to TestFlight (Beta)
        run: |
          echo "Deploying to Beta Testers..."
          echo "Version: ${{ github.event.inputs.version }}"
          # Add TestFlight beta deployment here
      
      - name: Deploy to Google Play Beta
        run: |
          echo "Deploying to Google Play Beta..."
          # Add Google Play beta deployment here
      
      - name: Notify Beta Testers
        run: |
          echo "Sending notification to beta testers"

  # ========== STAGE 4: SUBMIT FOR REVIEW (X + 10 hours) ==========
  submit_review:
    name: Submit for App Store Review
    runs-on: ubuntu-latest
    needs: [build_release, deploy_beta]
    if: |
      always() &&
      (needs.deploy_beta.result == 'success' || github.event.inputs.skip_to_stage == 'review') &&
      github.event.inputs.stop_at_stage != 'review' &&
      github.event.inputs.release_type == 'release_train'
    
    steps:
      - name: Wait for scheduled time (2 hours after beta)
        if: github.event.inputs.release_type == 'release_train' && github.event.inputs.skip_to_stage == ''
        run: sleep 7200
      
      - name: Submit to App Store Review
        run: |
          echo "Submitting to App Store Review..."
          echo "Version: ${{ github.event.inputs.version }}"
          # Add App Store submission here
      
      - name: Submit to Google Play Review
        run: |
          echo "Submitting to Google Play Review..."
          # Add Google Play submission here
      
      - name: Notify Team
        run: |
          echo "Apps submitted for review"

  # ========== STAGE 5: PRODUCTION RELEASE (X + 12 hours) ==========
  deploy_production:
    name: Release to Production
    runs-on: ubuntu-latest
    needs: [build_release, submit_review]
    if: |
      always() &&
      (needs.submit_review.result == 'success' || github.event.inputs.skip_to_stage == 'production') &&
      github.event.inputs.release_type == 'release_train'
    
    steps:
      - name: Wait for scheduled time (2 hours after review submission)
        if: github.event.inputs.release_type == 'release_train' && github.event.inputs.skip_to_stage == ''
        run: sleep 7200
      
      - name: Release to App Store
        run: |
          echo "Releasing to App Store..."
          echo "Version: ${{ github.event.inputs.version }}"
          # Add App Store release here
      
      - name: Release to Google Play Store
        run: |
          echo "Releasing to Google Play Store..."
          # Add Google Play release here
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.event.inputs.version }}
          release_name: Release ${{ github.event.inputs.version }}
          body: |
            Production release ${{ github.event.inputs.version }}
            
            Released to:
            - App Store
            - Google Play Store
          draft: false
          prerelease: false
      
      - name: Notify Team - Production Release
        run: |
          echo "🎉 Production release completed!"
          echo "Version: ${{ github.event.inputs.version }}"

  # ========== HOTFIX WORKFLOW (All stages at once) ==========
  hotfix_release:
    name: Hotfix Release (Immediate)
    runs-on: ubuntu-latest
    if: github.event.inputs.release_type == 'hotfix'
    
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master
      
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
      
      - name: Run Critical Tests
        run: |
          bundle install
          bundle exec rspec spec/unit --format documentation
          bundle exec cucumber -p smoke
      
      - name: Build Hotfix
        run: |
          echo "Building hotfix ${{ github.event.inputs.version }}"
          # Trigger Bitrise builds
      
      - name: Deploy to Internal (Immediate)
        run: |
          echo "Deploying hotfix to internal..."
      
      - name: Deploy to Beta (Immediate)
        run: |
          echo "Deploying hotfix to beta..."
      
      - name: Submit for Review (Immediate)
        run: |
          echo "Submitting hotfix for review..."
      
      - name: Release to Production (After approval)
        run: |
          echo "Releasing hotfix to production..."
      
      - name: Create Hotfix Tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v${{ github.event.inputs.version }}-hotfix" -m "Hotfix ${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}-hotfix"
      
      - name: Notify Team - Hotfix Released
        run: |
          echo "🚨 Hotfix ${{ github.event.inputs.version }} released!"
