name: Replace Release Train

on:
  workflow_dispatch:
    inputs:
      current_run_id:
        description: 'Current Release Train Run ID to replace'
        required: true
        type: string
      new_version:
        description: 'New Version (e.g., 1.0.1)'
        required: true
        type: string
      skip_to_stage:
        description: 'Start from stage'
        required: true
        type: choice
        options:
          - internal
          - friends_family
          - beta
          - review
          - production
      reason:
        description: 'Reason for replacement'
        required: true
        type: string

jobs:
  replace_release:
    name: Replace Release Train
    runs-on: ubuntu-latest
    
    steps:
      - name: Stop Current Release Train
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runId = '${{ github.event.inputs.current_run_id }}';
            
            console.log(`Stopping current release train: ${runId}`);
            
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId
            });
            
            console.log('Current release train stopped');
      
      - name: Wait for cancellation
        run: sleep 30
      
      - name: Start New Release Train
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const newVersion = '${{ github.event.inputs.new_version }}';
            const skipToStage = '${{ github.event.inputs.skip_to_stage }}';
            
            console.log(`Starting new release train: ${newVersion}`);
            console.log(`Starting from stage: ${skipToStage}`);
            
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release-train.yml',
              ref: 'master',
              inputs: {
                release_type: 'release_train',
                version: newVersion,
                skip_to_stage: skipToStage
              }
            });
            
            console.log('New release train started');
      
      - name: Create Replacement Report
        run: |
          cat > replacement_report.md << EOF
          # Release Train Replaced
          
          ## Old Release
          **Run ID:** ${{ github.event.inputs.current_run_id }}
          **Status:** Stopped
          
          ## New Release
          **Version:** ${{ github.event.inputs.new_version }}
          **Starting Stage:** ${{ github.event.inputs.skip_to_stage }}
          **Initiated By:** ${{ github.actor }}
          **Timestamp:** $(date)
          
          ## Reason
          ${{ github.event.inputs.reason }}
          
          ## Actions Taken
          1. Stopped current release train
          2. Started new release train from ${{ github.event.inputs.skip_to_stage }} stage
          3. Team notified
          EOF
          
          cat replacement_report.md
      
      - name: Notify Team
        run: |
          echo "🔄 Release train replaced!"
          echo "Old run stopped: ${{ github.event.inputs.current_run_id }}"
          echo "New version: ${{ github.event.inputs.new_version }}"
          echo "Starting from: ${{ github.event.inputs.skip_to_stage }}"
          # Add Slack/Email notification here
