name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform'
        required: true
        type: choice
        options:
          - android
          - ios
          - both
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - internal
          - beta
          - production
      version:
        description: 'Version'
        required: true
        type: string

jobs:
  deploy_android:
    name: Deploy Android
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.platform == 'android' ||
      github.event.inputs.platform == 'both'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Trigger Bitrise Android Build
        run: |
          WORKFLOW_ID=""
          case "${{ github.event.inputs.environment }}" in
            internal)
              WORKFLOW_ID="deploy_to_firebase"
              ;;
            beta)
              WORKFLOW_ID="deploy_to_firebase"
              ;;
            production)
              WORKFLOW_ID="deploy_to_production"
              ;;
          esac
          
          curl -X POST "https://app.bitrise.io/app/${{ secrets.BITRISE_APP_SLUG }}/build/start.json" \
            -H "Authorization: ${{ secrets.BITRISE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"hook_info\": {
                \"type\": \"bitrise\"
              },
              \"build_params\": {
                \"branch\": \"master\",
                \"workflow_id\": \"$WORKFLOW_ID\",
                \"environments\": [
                  {\"mapped_to\": \"VERSION\", \"value\": \"${{ github.event.inputs.version }}\"}
                ]
              }
            }"
      
      - name: Notify
        run: |
          echo "✅ Android deployment triggered"
          echo "Platform: Android"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Version: ${{ github.event.inputs.version }}"

  deploy_ios:
    name: Deploy iOS
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.platform == 'ios' ||
      github.event.inputs.platform == 'both'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Trigger Bitrise iOS Build
        run: |
          WORKFLOW_ID=""
          case "${{ github.event.inputs.environment }}" in
            internal)
              WORKFLOW_ID="deploy_to_firebase"
              ;;
            beta)
              WORKFLOW_ID="deploy_to_testflight"
              ;;
            production)
              WORKFLOW_ID="deploy_to_production"
              ;;
          esac
          
          curl -X POST "https://app.bitrise.io/app/${{ secrets.BITRISE_IOS_APP_SLUG }}/build/start.json" \
            -H "Authorization: ${{ secrets.BITRISE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"hook_info\": {
                \"type\": \"bitrise\"
              },
              \"build_params\": {
                \"branch\": \"master\",
                \"workflow_id\": \"$WORKFLOW_ID\",
                \"environments\": [
                  {\"mapped_to\": \"VERSION\", \"value\": \"${{ github.event.inputs.version }}\"}
                ]
              }
            }"
      
      - name: Notify
        run: |
          echo "✅ iOS deployment triggered"
          echo "Platform: iOS"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Version: ${{ github.event.inputs.version }}"
